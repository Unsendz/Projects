services:
  backend:
    build: .            
    container_name: library_backend
    ports:
      - "3001:3000"
    volumes:
      - .:/app           
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password123
      - DB_NAME=my_database
    depends_on:
      - db   
  db:
    image: mysql:8.0
    container_name: library_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: my_database
    ports:
      - "3307:3306"  
    volumes:
      - mysql_data:/var/lib/mysql 
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: library_phpmyadmin
    ports:
      - "8080:80"           
    environment:
      PMA_HOST: db          
      MYSQL_ROOT_PASSWORD: password123
    depends_on:
      - db

volumes:
  mysql_data:               