version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: my_database
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql  

  backend:
    build: .
    container_name: library_backend
    ports:
      - "3001:3000"
    depends_on:
      - db
    environment:
      - DB_HOST=db

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_tool
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db

volumes:
  mysql_data: