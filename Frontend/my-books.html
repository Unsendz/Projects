<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการของฉัน - Library System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary-color);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .book-title { font-size: 1.2rem; font-weight: 500; color: var(--primary-color); margin: 0; }
        .book-info { font-size: 14px; color: #666; margin: 5px 0 0 0; }
        .empty-state { text-align: center; padding: 50px; color: #999; border: 1px dashed #ccc; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <a href="index.html" style="text-decoration: none; color: var(--text-color);">← กลับหน้าแรก</a>
        <a href="search.html" class="btn btn-primary" style="width: auto; padding: 8px 20px;">+ จองเพิ่ม</a>
    </div>

    <h1>รายการหนังสือของฉัน</h1>
    
    <div id="displayArea"></div>
</div>

<script>
    async function render() {
        const area = document.getElementById('displayArea');
        try {
            const response = await fetch('http://localhost:3001/api/bookings');
            const data = await response.json();

            if (data.length === 0) {
                area.innerHTML = `
                    <div class="empty-state">
                        <p>ยังไม่มีรายการจองหนังสือ</p>
                        <a href="search.html" style="color: #2c3e50;">ไปหน้าจองหนังสือที่นี่</a>
                    </div>`;
                return;
            }

            area.innerHTML = data.map(item => `
                <div class="card">
                    <div>
                        <p class="book-title">  ${item.book_name}</p>
                        <p class="book-info">ผู้ยืม: ${item.user_name} | วันที่รับหนังสือ: ${new Date(item.booking_date).toLocaleDateString('th-TH')}</p>
                    </div>
                    <button class="btn" style="width:auto; margin:0; background-color:#e74c3c; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;" 
                        onclick="returnBook(${item.id})">คืนหนังสือ</button>
                </div>
            `).join('');
        } catch (e) {
            area.innerHTML = '<p style="color:red; text-align:center;"> เชื่อมต่อ Server ไม่ได้ (ลองเช็ค Docker พอร์ต 3001)</p>';
        }
    }

    async function returnBook(id) {
        if (confirm('คุณต้องการคืนหนังสือเล่มนี้ใช่หรือไม่?')) {
            try {
                const response = await fetch(`http://localhost:3001/api/bookings/${id}`, { 
                    method: 'DELETE' 
                });
                if (response.ok) {
                    render(); 
                }
            } catch (e) {
                alert('ไม่สามารถลบข้อมูลได้');
            }
        }
    }
    
    render();
</script>
</body>
</html>
